<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="robots" content="noindex,nofollow,noarchive,noimageindex,nosnippet,noai,noimageai" />
  <meta name="googlebot" content="noindex,nofollow,noarchive,noimageindex,nosnippet" />
  <meta name="bingbot" content="noindex,nofollow,noarchive,noimageindex,nosnippet" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Personal protocols rendered from Markdown." />
  <title>Protocols · Hermes Index</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --surface: #ffffff;
      --surface-soft: #f9fafb;
      --ink: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --line-strong: #9ca3af;
      --yellow: #facc15;
      --yellow-soft: #fef3c7;
      --green: #16a34a;
      color-scheme: light;
    }
    :root[data-theme="dark"] {
      --bg: #0f1115;
      --surface: #171a21;
      --surface-soft: #11141a;
      --ink: #e5e7eb;
      --muted: #9ca3af;
      --line: #2b303b;
      --line-strong: #4b5563;
      --yellow: #facc15;
      --yellow-soft: #3b300b;
      --green: #22c55e;
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--ink); }
    a { color: inherit; }
    .topbar { min-height: 58px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; gap: 12px; background: #111827; color: #f9fafb; border-bottom: 1px solid #0b1220; }
    .brand { display: inline-flex; align-items: center; gap: 9px; color: inherit; text-decoration: none; font-size: 14px; font-weight: 700; }
    .brand-mark { width: 18px; height: 18px; border: 2px solid var(--yellow); border-radius: 4px; }
    .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; justify-content: center; min-height: 34px; padding: 7px 10px; border: 1px solid rgba(255,255,255,.18); border-radius: 6px; background: transparent; color: #f9fafb; text-decoration: none; font: inherit; font-size: 13px; font-weight: 650; cursor: pointer; }
    .btn:hover { background: rgba(255,255,255,.09); }
    .title { width: min(960px, calc(100% - 28px)); margin: 28px auto 14px; padding: 18px; display: grid; grid-template-columns: minmax(240px, .85fr) minmax(280px, 1.15fr); gap: 24px; background: var(--surface); border: 1px solid var(--line); border-radius: 10px; }
    .eyebrow { display: inline-flex; align-items: center; gap: 7px; margin-bottom: 10px; color: var(--muted); font-size: 12px; font-weight: 750; letter-spacing: .08em; text-transform: uppercase; }
    .eyebrow::before { content: ""; width: 8px; height: 8px; border-radius: 2px; background: var(--yellow); border: 1px solid #ca8a04; }
    h1 { margin: 0; font-size: clamp(34px, 4.7vw, 52px); line-height: .98; letter-spacing: -.055em; }
    .title-copy { display: grid; align-content: center; gap: 10px; padding-left: 24px; border-left: 1px solid var(--line); }
    .title-copy p { margin: 0; color: var(--muted); line-height: 1.65; font-size: 15px; }
    .source-link { width: fit-content; display: inline-flex; padding: 7px 10px; border: 1px solid var(--line); border-radius: 6px; background: var(--surface-soft); color: var(--ink); text-decoration: none; font-size: 13px; font-weight: 700; }
    main { width: min(960px, calc(100% - 28px)); margin: 0 auto 48px; display: grid; grid-template-columns: 240px minmax(0, 1fr); gap: 14px; align-items: start; }
    .toc, .content { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; }
    .toc { position: sticky; top: 14px; padding: 12px; }
    .toc h2 { margin: 0 0 9px; font-size: 13px; text-transform: uppercase; letter-spacing: .055em; }
    .toc a { display: block; padding: 7px 8px; border-radius: 5px; color: var(--muted); text-decoration: none; font-size: 13px; line-height: 1.3; }
    .toc a:hover { background: var(--surface-soft); color: var(--ink); }
    .content { padding: 22px; }
    .content h1 { display: none; }
    .content h2 { margin: 28px 0 10px; padding-top: 18px; border-top: 1px solid var(--line); font-size: 24px; letter-spacing: -.035em; }
    .content h2:first-child, .content h1 + h2 { margin-top: 0; padding-top: 0; border-top: 0; }
    .content h3 { margin: 18px 0 8px; font-size: 14px; text-transform: uppercase; letter-spacing: .05em; }
    .content p, .content li { color: var(--muted); font-size: 15px; line-height: 1.65; }
    .content p { margin: 8px 0; }
    .content ul, .content ol { padding-left: 24px; margin: 8px 0 12px; }
    .content strong { color: var(--ink); }
    .content code { padding: 2px 5px; border: 1px solid var(--line); border-radius: 4px; background: var(--surface-soft); color: var(--ink); }
    .loading, .error { color: var(--muted); }
    @media (max-width: 760px) {
      .topbar { align-items: stretch; flex-direction: column; }
      .actions { display: grid; grid-template-columns: 1fr 1fr; }
      .btn { width: 100%; min-height: 40px; }
      .title { grid-template-columns: 1fr; margin-top: 18px; padding: 14px; }
      .title-copy { padding-left: 0; padding-top: 14px; border-left: 0; border-top: 1px solid var(--line); }
      main { width: 100%; grid-template-columns: 1fr; gap: 0; }
      .toc { position: static; border-left: 0; border-right: 0; border-radius: 0; }
      .content { border-left: 0; border-right: 0; border-radius: 0; padding: 16px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/"><span class="brand-mark"></span><span>protocols</span></a>
    <nav class="actions" aria-label="Protocol actions">
      <a class="btn" href="/roadmaps/">Roadmaps</a>
      <button class="btn" id="themeToggle" type="button" aria-pressed="false">☾ Theme</button>
    </nav>
  </header>

  <section class="title">
    <div>
      <span class="eyebrow">Reference</span>
      <h1>Protocols</h1>
    </div>
    <div class="title-copy">
      <p>Reusable procedures for study, research, applications, and weekly reviews. Edit the Markdown file; this page renders it automatically.</p>
      <a class="source-link" href="/protocols/content.md">Edit source: content.md</a>
    </div>
  </section>

  <main>
    <aside class="toc" aria-label="Protocols table of contents">
      <h2>Contents</h2>
      <div id="toc"><span class="loading">Loading…</span></div>
    </aside>
    <article class="content" id="content"><p class="loading">Loading Markdown…</p></article>
  </main>

  <script>
    const source = '/protocols/content.md';
    const escapeHtml = text => text.replace(/[&<>]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[ch]));
    const slug = text => text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'section';
    function inline(text) {
      return escapeHtml(text)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    }
    function renderMarkdown(md) {
      const lines = md.split(/\r?\n/);
      let html = '';
      let list = null;
      const closeList = () => { if (list) { html += `</${list}>`; list = null; } };
      for (const raw of lines) {
        const line = raw.trimEnd();
        if (!line.trim()) { closeList(); continue; }
        const heading = /^(#{1,3})\s+(.+)$/.exec(line);
        if (heading) {
          closeList();
          const level = heading[1].length;
          const text = heading[2].trim();
          const id = level === 2 ? ` id="${slug(text)}"` : '';
          html += `<h${level}${id}>${inline(text)}</h${level}>`;
          continue;
        }
        const ordered = /^\d+\.\s+(.+)$/.exec(line);
        if (ordered) {
          if (list !== 'ol') { closeList(); html += '<ol>'; list = 'ol'; }
          html += `<li>${inline(ordered[1])}</li>`;
          continue;
        }
        const unordered = /^[-*]\s+(.+)$/.exec(line);
        if (unordered) {
          if (list !== 'ul') { closeList(); html += '<ul>'; list = 'ul'; }
          html += `<li>${inline(unordered[1])}</li>`;
          continue;
        }
        closeList();
        html += `<p>${inline(line)}</p>`;
      }
      closeList();
      return html;
    }
    function renderToc(article) {
      const items = [...article.querySelectorAll('h2')];
      document.getElementById('toc').innerHTML = items.map(h => `<a href="#${h.id}">${h.textContent}</a>`).join('') || '<span class="loading">No sections</span>';
    }
    fetch(source, { cache: 'no-store' })
      .then(r => { if (!r.ok) throw new Error(`Markdown load failed: ${r.status}`); return r.text(); })
      .then(md => { const article = document.getElementById('content'); article.innerHTML = renderMarkdown(md); renderToc(article); })
      .catch(err => { document.getElementById('content').innerHTML = `<p class="error">${escapeHtml(err.message)}</p>`; });
    (() => {
      const key = 'roadmaps-theme';
      const root = document.documentElement;
      const btn = document.getElementById('themeToggle');
      const apply = theme => { root.dataset.theme = theme; btn.setAttribute('aria-pressed', String(theme === 'dark')); btn.textContent = theme === 'dark' ? '☀ Theme' : '☾ Theme'; };
      apply(localStorage.getItem(key) || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
      btn.addEventListener('click', () => { const next = root.dataset.theme === 'dark' ? 'light' : 'dark'; localStorage.setItem(key, next); apply(next); });
    })();
  </script>
</body>
</html>
